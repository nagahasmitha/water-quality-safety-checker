<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Safety Checker</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

</head>

<body>

<header>
<h1>💧 Water Safety Checker</h1>
<p>Check whether water is safe to drink based on heavy metal levels</p>
</header>

<div class="container">

<div class="card">

<label>Place Name</label>
<input type="text" id="place" placeholder="Enter location">

<label>Lead (µg/L)</label>
<input type="number" id="lead">

<label>Mercury (µg/L)</label>
<input type="number" id="mercury">

<label>Arsenic (µg/L)</label>
<input type="number" id="arsenic">

<label>Cadmium (µg/L)</label>
<input type="number" id="cadmium">

<button id="checkBtn">Check Water Safety</button>

<div id="result"></div>

</div>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
